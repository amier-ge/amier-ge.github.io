{{ define "main" }}
  <a class="back-link" href="{{ "/blog/" | relURL }}">&larr; back to blog</a>
  {{ partial "section-title.html" (printf "%s: %s" (.Data.Singular | upper) .Title) }}
  {{ $posts := .Pages }}
  {{ if $posts }}
  <div class="card-grid">
    {{ range $posts }}
      {{ partial "post-card.html" . }}
    {{ end }}
  </div>
  {{ else }}
  <p class="no-results">// no posts in this term</p>
  {{ end }}
{{ end }}
