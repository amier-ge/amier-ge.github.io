{{ define "main" }}
<article>
  <div class="page-head">
    <a class="back-link" href="{{ "/blog/" | relLangURL }}">&larr; back to blog</a>
    {{ if eq .Section "blog" }}{{ partial "lang-switch.html" . }}{{ end }}
  </div>
  <header class="post-header">
    <div class="meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006.01.02" }}</time>
      {{ range .Params.categories }}<span class="badge">{{ . }}</span>{{ end }}
    </div>
    <h1>{{ .Title }}</h1>
  </header>
  <div class="prose">
    {{ .Content }}
  </div>
</article>
{{ if eq .Section "blog" }}{{ partial "comments.html" . }}{{ end }}
{{ end }}
