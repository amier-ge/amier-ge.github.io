{{ define "main" }}
<article>
  <a class="back-link" href="{{ "/blog/" | relURL }}">&larr; back to blog</a>
  <header class="post-header">
    <div class="meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006.01.02" }}</time>
      {{ range .Params.categories }}<span class="badge">{{ . }}</span>{{ end }}
    </div>
    <h1>{{ .Title }}</h1>
  </header>
  <div class="prose">
    {{ .Content }}
  </div>
</article>
{{ end }}
