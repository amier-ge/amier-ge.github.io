<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-left">
      <span class="accent">$</span> echo "© {{ now.Year }} {{ site.Params.brand }} — {{ site.Params.fullName }}"
    </div>
    <div class="footer-right" id="visitor-counter" aria-label="visitor counter">
      <span>TODAY <span class="accent" id="visit-today">–</span></span>
      <span class="sep">/</span>
      <span>TOTAL <span class="accent" id="visit-total">–</span></span>
    </div>
  </div>
</footer>
