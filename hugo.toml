baseURL = "https://amier-ge.github.io/"
title = "amier_ge"
enableEmoji = true
enableRobotsTXT = true

# ── 다국어 (한국어 기본 / 영어 번역본) ───────────────────────────────────
# 한국어 = 기존 URL 그대로(/blog/...), 영어 = /en/ 하위(/en/blog/...).
#   → 기존 링크·SEO·giscus 댓글(pathname 매칭)이 안 깨짐.
# 번역 추가법: 원본 옆에 .en.md 를 두면 Hugo가 자동으로 짝지음.
#   예) content/blog/OpenClaw.md (한국어)  →  content/blog/OpenClaw.en.md (영어)
defaultContentLanguage = "ko"
defaultContentLanguageInSubdir = false
# 날짜를 한국 시간 기준으로 해석 (미래글로 오인돼 글이 안 뜨는 문제 방지)
timeZone = "Asia/Seoul"

# 요약 길이(블로그 카드/검색 인덱스용)
summaryLength = 30

# 이미지 처리 화질 (파비콘/프로필 리사이즈 선명도 향상)
[imaging]
  resampleFilter = "Lanczos"
  quality = 92

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.highlight]
    style = "github-dark"
    noClasses = true
    lineNos = false
  [markup.goldmark.renderer]
    unsafe = true   # 마크다운 내 HTML 허용
  [markup.goldmark.extensions.cjk]
    enable = true            # 한글 등 CJK 옆 **굵게**/_기울임_ 인식
    eastAsianLineBreaks = true
    escapedSpace = true

# 언어 정의 + 우상단 네비게이션(HOME · ABOUT ME · BLOG · CONTACT)은 언어별로 둠.
# languageName(KO/EN)은 언어 전환 버튼에 그대로 표시됨.
[languages]
  [languages.ko]
    languageCode = "ko-KR"
    languageName = "KO"
    weight = 1
    [languages.ko.menu]
      [[languages.ko.menu.main]]
        name = "HOME"
        url = "/"
        weight = 1
      [[languages.ko.menu.main]]
        name = "ABOUT ME"
        url = "/about/"
        weight = 2
      [[languages.ko.menu.main]]
        name = "BLOG"
        url = "/blog/"
        weight = 3
      [[languages.ko.menu.main]]
        name = "CONTACT"
        url = "/contact/"
        weight = 4

  [languages.en]
    languageCode = "en-US"
    languageName = "EN"
    weight = 2
    [languages.en.menu]
      [[languages.en.menu.main]]
        name = "HOME"
        url = "/en/"
        weight = 1
      [[languages.en.menu.main]]
        name = "ABOUT ME"
        url = "/en/about/"
        weight = 2
      [[languages.en.menu.main]]
        name = "BLOG"
        url = "/en/blog/"
        weight = 3
      [[languages.en.menu.main]]
        name = "CONTACT"
        url = "/en/contact/"
        weight = 4

[params]
  brand = "amier_ge"
  description = "amier_ge's blog"
  # 참고용 표기 — 실제 로직은 layouts/partials/head.html의 인라인 스크립트에 있음.
  # 첫 진입은 OS 설정과 무관하게 항상 dark, 방문자가 토글하면 그 선택을 localStorage에 기억.
  defaultTheme = "dark"

  # 소셜 / 연락처 (ABOUT, CONTACT 공용)
  fullName = "YoungJin Ban"
  location = "Seoul, South Korea"
  email = "amierge.df@gmail.com"
  github = "https://github.com/amier-ge"
  githubHandle = "amier-ge"
  instagram = "https://instagram.com/amier_ge_"
  instagramHandle = "@amier_ge_"

  # 블로그 카테고리 (ALL 버튼은 템플릿에서 자동 추가)
  categories = ["CTF", "Write-Up", "Tooling", "Career", "Education", "Others"]

# ── 댓글 (Giscus, GitHub Discussions 기반) ───────────────────────────────
# 네 값 4개(repo / repoId / category / categoryId)가 다 채워지면 댓글창이 켜지고,
# 비어 있으면 글 하단에 "배포 후 활성화" 안내 박스만 보임(로컬에서 미리보기 용).
# 값 받는 곳: https://giscus.app 에서 저장소 입력 → 아래 4개를 그대로 복사.
#   (전제: 저장소가 public + Settings>General>Discussions 켜짐 + giscus 앱 설치)
[params.giscus]
  repo            = "amier-ge/amier-ge.github.io"
  repoId          = "R_kgDOSuApyw"
  category        = "Announcements"   # 방문자는 댓글만, 새 토론은 못 만들게(권장)
  categoryId      = "DIC_kwDOSuApy84C-WmS"
  mapping         = "pathname"  # 글 1개 ↔ 토론 1개 매칭 기준
  reactions       = true        # 👍 같은 리액션 버튼
  inputPosition   = "top"       # 입력창 위치 (top | bottom)
  lang            = "ko"        # 댓글 UI 언어
  # 다크/라이트 토글에 맞춰 자동 전환됨. 아래는 각 모드에서 쓸 Giscus 테마.
  themeDark       = "transparent_dark"
  themeLight      = "light"
